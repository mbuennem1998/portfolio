       <form class="commission-form" action="http://localhost:3000/commission" method="POST" enctype="multipart/form-data">
            <h2>Commission Request</h2>

            <label for="service">What service are you looking for?</label>
            <select id="service" name="service" required>
                <option value="" data-price="0">Select a service...</option>
                <option value="Logo Design" data-price="25">Logo Design</option>
                <option value="Graphic Design" data-price="15">Graphic Design</option>
                <option value="Video Editing" data-price="50">Photo/Video Editing</option>
                <option value="Web Design" data-price="100">Web Design</option>
                <option value="Other" data-price="TBD">Other</option>
            </select>

            <p id="priceDisplay" style="color: var(--accent); text-shadow: var(--text-glow)">Price: —</p>
            <input type="hidden" id="price" name="price" />

            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required />

            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" required />

            <label for="due_date">When do you need it done? Please give me at leaest two weeks to 
complete your request. If you need it sooner, please contact me first to see if I can accommodate your request.</label>
            </label>
            <input type="date" id="due_date" name="due_date" required />


            <label for="details">Tell me about your project</label>
            <textarea id="details" name="details" rows="5" required></textarea>

            <label for="reference">Reference Images (optional)</label>
            <input type="file" id="reference" name="reference" accept="image/*" multiple />

            <button type="submit">Submit Request</button>
        </form>

        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
      <script>
document.querySelector(".commission-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const form = document.querySelector(".commission-form");
    const formData = new FormData(form);

    try {
        const response = await fetch("https://commission-backend-erws.onrender.com/", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (result.success) {
            alert("Your request has been submitted! Your request ID is: " + result.request_id);
            form.reset();
        } else {
            alert("There was an error submitting your request.");
        }
    } catch (err) {
        console.error(err);
        alert("Server error — could not submit your request.");
    }
});
</script>
<script>
document.getElementById("service").addEventListener("change", function () {
    const selected = this.options[this.selectedIndex];
    const price = selected.dataset.price;

    document.getElementById("price").value = price;
    document.getElementById("priceDisplay").textContent = price > 0 ? `Price: $${price}` : "Price: TBD";
});
</script>
